<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS ALIMENTOS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="nav-bar-principal">
            <nav>
                <div class="left-first-line">
                    <li><a href="#">Mercado</a></li>
                    <li><a href="#">Contato</a></li>
                </div>
                <div class="right-first-line">
                    <li><a href="#">WHATSAPP</a></li>
                    <li><a href="#">INSTAGRAM</a></li>
                </div>
            </nav>
        </div>
        <div class="nav-bar-secundaria">
            <div class="logo">
                <img src="img/logo.png" alt="Logo">
            </div>
            <button id="btnHamburguer" class="hamburguer-btn">
                <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                Todos os departamentos</button>
            <div class="nav-links">
                <a href="#">Ofertas da semana</a>
                <a href="#">Favoritos</a>
                <a href="#">Folhetos</a>
            </div>
            <div class="pesquisa">
                <input type="text" placeholder="O que você está procurando?" id="search-input">
                <button
                    class="size-7 md:size-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 hover:text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 disabled:opacity-50 transition-all duration-200"
                    title="Buscar"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-search h-4 w-4" aria-hidden="true">
                        <path d="m21 21-4.34-4.34"></path>
                        <circle cx="11" cy="11" r="8"></circle>
                    </svg></button>
            </div>
        </div>
    </header>

    <div id="banner-carrossel" class="banner-carrossel">
        <div class="slides">
            <div class="slide ativo"><img src="banner1.jpg" alt="Banner 1"></div>
            <div class="slide"><img src="banner2.jpg" alt="Banner 2"></div>
            <div class="slide"><img src="banner3.jpg" alt="Banner 3"></div>
        </div>
        <button class="botao-ant" onclick="mudarSlide(-1)">&#10094;</button>
        <button class="botao-prox" onclick="mudarSlide(1)">&#10095;</button>
    </div>

    <div class="Ofertas">
        <div class="barra-superior">
            <p>Ofertas</p>
            <button class="text-sm p-1 text-gray-400 hover:text-blue-500 transition-all duration-200 flex items-center"
                title="Compartilhar corredor" aria-label="Compartilhar corredor"><svg xmlns="http://www.w3.org/2000/svg"
                    width="18" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share2 lucide-share-2 h-4 w-4"
                    aria-hidden="true">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line>
                    <line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line>
                </svg></button>
            <button class="botao-ant" onclick="">&#10094;</button>
            <button class="botao-prox" onclick="">&#10095;</button>
        </div>
        <div class="itens-vertical">

        </div>
    </div>
</body>

<script src="script.js"></script>

</html>
